<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Cinema - Sign Up</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/auth.css" rel="stylesheet">
</head>
<body>
    <!-- Background -->
    <div class="auth-background"></div>
    <div class="auth-overlay"></div>

    <!-- Back Button -->
    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i>
        Back to Home
    </a>

    <!-- Signup Container -->
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <a href="index.html" class="navbar-brand">
                    <div class="aurora-logo">
                        <svg width="50" height="50" viewBox="0 0 100 100">
                            <defs>
                                <linearGradient id="aurora-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
                                    <stop offset="33%" style="stop-color:#00ccff;stop-opacity:1" />
                                    <stop offset="66%" style="stop-color:#9966ff;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#ff6bb3;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <path class="aurora-waves" d="M15,70 Q25,20 50,30 Q75,40 85,15" stroke="url(#aurora-gradient)" stroke-width="4" fill="none">
                                <animate attributeName="d" 
                                    values="M15,70 Q25,20 50,30 Q75,40 85,15;M15,65 Q30,25 50,35 Q70,35 85,20;M15,70 Q25,20 50,30 Q75,40 85,15" 
                                    dur="4s" repeatCount="indefinite"/>
                            </path>
                            <path class="aurora-waves" d="M10,80 Q30,30 50,40 Q70,50 90,25" stroke="url(#aurora-gradient)" stroke-width="3" fill="none" opacity="0.7">
                                <animate attributeName="d" 
                                    values="M10,80 Q30,30 50,40 Q70,50 90,25;M10,75 Q35,35 50,45 Q65,45 90,30;M10,80 Q30,30 50,40 Q70,50 90,25" 
                                    dur="3s" repeatCount="indefinite"/>
                            </path>
                            <path class="aurora-waves" d="M20,85 Q40,35 50,45 Q60,55 80,30" stroke="url(#aurora-gradient)" stroke-width="2" fill="none" opacity="0.5">
                                <animate attributeName="d" 
                                    values="M20,85 Q40,35 50,45 Q60,55 80,30;M20,80 Q45,40 50,50 Q55,50 80,35;M20,85 Q40,35 50,45 Q60,55 80,30" 
                                    dur="2s" repeatCount="indefinite"/>
                            </path>
                        </svg>
                    </div>
                    <span class="brand-text">Aurora Cinema</span>
                </a>
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join Aurora Cinema for the ultimate movie experience</p>
            </div>

            <!-- Signup Form -->
            <form id="signupForm">
                <!-- Name Fields -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName" class="form-label">First Name</label>
                        <div class="position-relative">
                            <input type="text" class="form-control" id="firstName" name="firstName" 
                                   placeholder="First name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="lastName" class="form-label">Last Name</label>
                        <div class="position-relative">
                            <input type="text" class="form-control" id="lastName" name="lastName" 
                                   placeholder="Last name" required>
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="position-relative">
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="Enter your email" required>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="phone" class="form-label">Phone Number</label>
                    <div class="position-relative">
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               placeholder="+94 XX XXX XXXX" required>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>

                <!-- Card Details -->
                <div class="form-group">
                    <label for="cardNumber" class="form-label">Card Number</label>
                    <div class="position-relative">
                        <input type="text" class="form-control" id="cardNumber" name="cardNumber" 
                               placeholder="1234 5678 9012 3456" maxlength="19" required>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>

                <!-- Card Details Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="expiryDate" class="form-label">Expiry Date</label>
                        <div class="position-relative">
                            <input type="text" class="form-control" id="expiryDate" name="expiryDate" 
                                   placeholder="MM/YY" maxlength="5" required>
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="cvv" class="form-label">CVV</label>
                        <div class="position-relative">
                            <input type="text" class="form-control" id="cvv" name="cvv" 
                                   placeholder="123" maxlength="4" required>
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Create a strong password" required>
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                    <div class="password-strength" id="passwordStrength" style="display: none;">
                        <div class="strength-indicator">
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                        </div>
                        <div class="strength-text">Password strength: <span id="strengthText">Weak</span></div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                               placeholder="Confirm your password" required>
                        <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>

                <!-- Terms and Privacy -->
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="agreeTerms" name="agreeTerms" required>
                    <label class="form-check-label" for="agreeTerms">
                        I agree to the <a href="#" target="_blank">Terms of Service</a> and 
                        <a href="#" target="_blank">Privacy Policy</a>
                    </label>
                </div>

                <!-- Marketing Consent -->
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="marketingConsent" name="marketingConsent">
                    <label class="form-check-label" for="marketingConsent">
                        I would like to receive promotional emails about new movies and special offers
                    </label>
                </div>

                <button type="submit" class="btn btn-auth btn-signup" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>or sign up with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <a href="#" class="btn-social" onclick="socialSignup('google')">
                    <i class="fab fa-google"></i>
                    Google
                </a>
                <a href="#" class="btn-social" onclick="socialSignup('facebook')">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </a>
            </div>

            <!-- Links -->
            <div class="auth-links">
                <p class="mb-0">
                    Already have an account? 
                    <a href="login.html">Sign in here</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Page Transition Overlay -->
    <div class="page-transition" id="pageTransition"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/auth.js"></script>
    
    <script>
        // Card validation functions
        function isValidCardNumber(cardNumber) {
            // Remove spaces and check if it's 16 digits
            const cleanNumber = cardNumber.replace(/\s/g, '');
            return /^\d{16}$/.test(cleanNumber);
        }
        
        function isValidExpiryDate(expiryDate) {
            // Check MM/YY format
            const regex = /^(0[1-9]|1[0-2])\/\d{2}$/;
            if (!regex.test(expiryDate)) return false;
            
            const [month, year] = expiryDate.split('/');
            const currentDate = new Date();
            const currentYear = currentDate.getFullYear() % 100;
            const currentMonth = currentDate.getMonth() + 1;
            
            const expYear = parseInt(year);
            const expMonth = parseInt(month);
            
            if (expYear < currentYear || (expYear === currentYear && expMonth < currentMonth)) {
                return false;
            }
            
            return true;
        }
        
        function isValidCVV(cvv) {
            return /^\d{3,4}$/.test(cvv);
        }
        
        // Input formatting functions
        function formatCardNumber(input) {
            let value = input.value.replace(/\s/g, '').replace(/[^0-9]/gi, '');
            let formattedValue = value.match(/.{1,4}/g)?.join(' ') || value;
            if (formattedValue.length > 19) formattedValue = formattedValue.substr(0, 19);
            input.value = formattedValue;
        }
        
        function formatExpiryDate(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            input.value = value;
        }
        
        function formatCVV(input) {
            input.value = input.value.replace(/[^0-9]/g, '');
        }
        
        // Add event listeners for formatting
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            formatCardNumber(e.target);
        });
        
        document.getElementById('expiryDate').addEventListener('input', function(e) {
            formatExpiryDate(e.target);
        });
        
        document.getElementById('cvv').addEventListener('input', function(e) {
            formatCVV(e.target);
        });

        // Form validation function
        function validateForm() {
            let isValid = true;
            
            // Clear previous validation
            document.querySelectorAll('.form-control').forEach(input => {
                input.classList.remove('is-invalid', 'is-valid');
            });
            
            // Required field validation
            const requiredFields = ['firstName', 'lastName', 'email', 'phone', 'cardNumber', 'expiryDate', 'cvv', 'password', 'confirmPassword'];
            requiredFields.forEach(fieldId => {
                const field = document.getElementById(fieldId);
                if (!field.value.trim()) {
                    showFieldError(field, 'This field is required');
                    isValid = false;
                } else {
                    field.classList.add('is-valid');
                }
            });
            
            // Email validation
            const email = document.getElementById('email');
            if (email.value && !isValidEmail(email.value)) {
                showFieldError(email, 'Please enter a valid email address');
                isValid = false;
            }
            
            // Phone validation
            const phone = document.getElementById('phone');
            if (phone.value && !isValidPhone(phone.value)) {
                showFieldError(phone, 'Please enter a valid phone number');
                isValid = false;
            }
            
            // Card number validation
            const cardNumber = document.getElementById('cardNumber');
            if (cardNumber.value && !isValidCardNumber(cardNumber.value)) {
                showFieldError(cardNumber, 'Please enter a valid card number');
                isValid = false;
            }
            
            // Expiry date validation
            const expiryDate = document.getElementById('expiryDate');
            if (expiryDate.value && !isValidExpiryDate(expiryDate.value)) {
                showFieldError(expiryDate, 'Please enter a valid expiry date (MM/YY)');
                isValid = false;
            }
            
            // CVV validation
            const cvv = document.getElementById('cvv');
            if (cvv.value && !isValidCVV(cvv.value)) {
                showFieldError(cvv, 'Please enter a valid CVV (3-4 digits)');
                isValid = false;
            }
            
            // Password validation
            const password = document.getElementById('password');
            if (password.value && password.value.length < 8) {
                showFieldError(password, 'Password must be at least 8 characters long');
                isValid = false;
            }
            
            // Confirm password validation
            const confirmPassword = document.getElementById('confirmPassword');
            if (confirmPassword.value !== password.value) {
                showFieldError(confirmPassword, 'Passwords do not match');
                isValid = false;
            }
            
            // Terms agreement validation
            const agreeTerms = document.getElementById('agreeTerms');
            if (!agreeTerms.checked) {
                alert('Please agree to the Terms of Service and Privacy Policy');
                isValid = false;
            }
            
            return isValid;
        }

        // Form validation
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!validateForm()) {
                return;
            }
            
            const signupBtn = document.getElementById('signupBtn');
            const btnText = signupBtn.querySelector('.btn-text');
            
            // Show loading state
            signupBtn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div> Creating Account...';
            
            // Simulate signup process
            setTimeout(() => {
                const formData = new FormData(this);
                const userData = Object.fromEntries(formData.entries());
                
                // Here you would typically make an API call to your backend
                console.log('Signup attempt:', userData);
                
                // Show success message
                alert('Account created successfully! Please check your email to verify your account.');
                
                // Reset button state
                signupBtn.disabled = false;
                btnText.innerHTML = 'Create Account';
                
                // Show page transition and redirect
                showPageTransition();
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 500);
            }, 2500);
        });
    </script>
</body>
</html>
